<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding-top: 0;
    background: #06001a;
    text-align: center;
    overflow: hidden;
  }

  .error-container {
    position: relative;
    z-index: 2;
    padding: 40px 20px;
    animation: fadeUp 0.8s ease forwards;
  }

  .error-code {
    font-size: clamp(100px, 20vw, 180px);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, #00c3ff, #0073b7, #00c3ff);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
    letter-spacing: -5px;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .error-title {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 600;
    color: #fff;
    margin: 10px 0 15px;
    letter-spacing: -0.3px;
  }

  .error-desc {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    max-width: 400px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .error-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, #00c3ff, #0073b7);
    color: white;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 8px 30px rgba(0, 195, 255, 0.35);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 45px rgba(0, 195, 255, 0.5);
  }

  .btn-secondary {
    display: inline-block;
    padding: 14px 36px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    transition: transform 0.3s ease, background 0.3s ease;
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.12);
    transform: translateY(-3px);
  }

  /* Ambient blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    z-index: 1;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }

  .blob-1 {
    width: 500px;
    height: 500px;
    background: #00c3ff;
    top: -150px;
    left: -150px;
  }

  .blob-2 {
    width: 400px;
    height: 400px;
    background: #0073b7;
    bottom: -100px;
    right: -100px;
    animation-delay: -6s;
  }

  @keyframes blobFloat {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.1); }
  }

  .divider {
    width: 50px;
    height: 3px;
    background: linear-gradient(90deg, #00c3ff, #0073b7);
    border-radius: 2px;
    margin: 0 auto 25px;
  }
</style>



</head>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="error-container">
  <div class="error-code">404</div>
  <div class="divider"></div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-desc">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

  <div class="error-actions">
    <a href="index.html" class="btn-primary">Back to Home</a>
    <a href="contact.html" class="btn-secondary">Contact Us</a>
  </div>
</div>

<div class="cursor"></div>

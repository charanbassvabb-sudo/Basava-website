              - { label: "Subtitle", name: "subtitle", widget: "text" }
          - label: "Events (add, remove, or reorder freely)"
            name: "events"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list" }
              - label: "Photos"
                name: "images"
                widget: "list"
                summary: "{{alt}}"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
